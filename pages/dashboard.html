<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GroupMate — Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    .dash-grid { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
    .dash-left, .dash-right { display: flex; flex-direction: column; gap: 20px; }
    @media (max-width: 960px) { .dash-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-mount"></div>

  <div class="main-content">
    <div id="topbar-mount"></div>

    <div class="page-body">
      <!-- Stats -->
      <div class="stats-row" id="stats-row"></div>

      <div class="dash-grid">
        <div class="dash-left">
          <!-- Progress -->
          <div class="card">
            <div class="card-title">
              <span>Overall Group Progress</span>
              <span class="chip chip-green" id="pct-label">0%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            </div>
            <div class="text-muted" style="margin-top:12px" id="progress-sub"></div>
          </div>

          <!-- Recent Tasks -->
          <div class="card">
            <div class="card-title">
              <span>Recent Tasks</span>
              <a href="tasks.html" class="btn btn-sm btn-solid">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add Task
              </a>
            </div>
            <div id="dash-task-list"></div>
          </div>
        </div>

        <div class="dash-right">
          <!-- Member Activity -->
          <div class="card">
            <div class="card-title">Member Activity</div>
            <div id="member-activity"></div>
          </div>

          <!-- Quick Alerts -->
          <div class="card">
            <div class="card-title">
              <span>Recent Alerts</span>
              <span class="chip chip-orange">2 new</span>
            </div>
            <div id="quick-alerts"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="../js/shared.js"></script>
<script>
  requireAuth();
  document.getElementById('sidebar-mount').innerHTML = buildSidebar('dashboard');
  document.getElementById('topbar-mount').innerHTML  = buildTopbar('Dashboard');

  function render() {
    const tasks = GM.tasks;
    const done  = tasks.filter(t => t.status === 'done').length;
    const inP   = tasks.filter(t => t.status === 'in-progress').length;
    const today = new Date().toISOString().slice(0,10);
    const over  = tasks.filter(t => t.status !== 'done' && t.deadline < today).length;
    const pct   = Math.round((done / tasks.length) * 100);

    // Stats
    document.getElementById('stats-row').innerHTML = `
      <div class="stat-card green"><div class="stat-label">Completed</div><div class="stat-value">${done}</div><div class="stat-sub">of ${tasks.length} tasks</div></div>
      <div class="stat-card orange"><div class="stat-label">In Progress</div><div class="stat-value">${inP}</div><div class="stat-sub">tasks active</div></div>
      <div class="stat-card red"><div class="stat-label">Overdue</div><div class="stat-value">${over}</div><div class="stat-sub">needs attention</div></div>
      <div class="stat-card blue"><div class="stat-label">Days Left</div><div class="stat-value">12</div><div class="stat-sub">submission: 5 Jun</div></div>`;

    // Progress
    const fillEl = document.getElementById('progress-fill');
    fillEl.style.width = pct + '%';
    fillEl.className = 'progress-fill' + (pct < 30 ? ' red' : pct < 60 ? ' orange' : '');
    document.getElementById('pct-label').textContent = pct + '%';
    document.getElementById('progress-sub').textContent =
      `${done} of ${tasks.length} tasks completed · ${pct >= 60 ? "Great progress! 🎯" : "Keep pushing! 💪"}`;

    // Recent tasks (first 5)
    document.getElementById('dash-task-list').innerHTML = tasks.slice(0,5).map(t => taskHTML(t)).join('');

    // Member activity
    document.getElementById('member-activity').innerHTML = GM.members.map(m => {
      const mt  = tasks.filter(t => t.assignee === m.name);
      const md  = mt.filter(t => t.status === 'done').length;
      const mp  = mt.length ? Math.round((md / mt.length) * 100) : 0;
      return `<div class="member-row">
        <div class="avatar avatar-md" style="background:${m.color};color:white">${m.initials}</div>
        <div class="member-info">
          <div class="member-name" style="font-size:13px">${m.name}</div>
          <div class="progress-bar" style="margin-top:5px"><div class="progress-fill" style="width:${mp}%;background:${m.color}"></div></div>
        </div>
        <span style="font-size:12px;font-weight:700;color:${m.color};min-width:32px;text-align:right">${mp}%</span>
      </div>`;
    }).join('');

    // Quick alerts (unread notifications)
    const unread = GM.notifications.filter(n => !n.read);
    document.getElementById('quick-alerts').innerHTML = unread.slice(0,3).map(n => `
      <div class="notif-item unread">
        <div class="notif-icon ${n.type}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </div>
        <div class="notif-text">
          <div class="notif-title">${n.title}</div>
          <div class="notif-body">${n.body}</div>
          <div class="notif-time">${n.time}</div>
        </div>
      </div>`).join('') || '<div class="text-muted" style="padding:12px">No new alerts 🎉</div>';
  }

  // Toggle task status from dashboard
  function toggleTask(id) {
    const tasks = GM.tasks;
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    t.status = t.status === 'done' ? 'todo' : 'done';
    GM.saveTasks(tasks);
    toast(t.status === 'done' ? '🎉 Task completed!' : 'Task marked as to-do.', t.status === 'done' ? 'success' : 'info');
    render();
  }

  render();
</script>
</body>
</html>
