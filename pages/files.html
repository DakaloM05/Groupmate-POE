<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GroupMate — Files</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
<div class="app-layout">
  <div id="sidebar-mount"></div>

  <div class="main-content">
    <div id="topbar-mount"></div>

    <div class="page-body">
      <div class="section-header">
        <div class="section-title">Shared Files</div>
        <button class="btn btn-solid" onclick="openModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
          Upload File
        </button>
      </div>

      <div class="card">
        <div class="file-grid" id="file-grid"></div>
      </div>
    </div>
  </div>
</div>

<!-- Upload Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">Upload File</div>
    <div class="modal-sub">Share a document with your group members.</div>

    <div class="upload-zone" onclick="simulateUpload()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
      <p><strong>Click to select a file</strong> or drag and drop</p>
      <p style="margin-top:4px;font-size:12px;color:var(--text-3)">PDF, DOCX, XLSX, PPTX up to 20 MB</p>
    </div>

    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="../js/shared.js"></script>
<script>
  requireAuth();
  document.getElementById('sidebar-mount').innerHTML = buildSidebar('files');
  document.getElementById('topbar-mount').innerHTML  = buildTopbar('Files');

  const fileIcons = { pdf:'📄', docx:'📝', xlsx:'📊', pptx:'📑', default:'📎' };

  function render() {
    const files = GM.files;
    document.getElementById('file-grid').innerHTML = files.map(f => `
      <div class="file-card" title="Uploaded by ${escapeHtml(f.by)}">
        <div class="file-icon">${fileIcons[f.type] || fileIcons.default}</div>
        <div class="file-name">${escapeHtml(f.name)}</div>
        <div class="file-meta">${f.size} · ${f.date}</div>
        <div class="file-meta">by ${escapeHtml(f.by.split(' ')[0])}</div>
      </div>`).join('');
  }

  function openModal()  { document.getElementById('modal').classList.add('open'); }
  function closeModal() { document.getElementById('modal').classList.remove('open'); }
  document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });

  const sampleFiles = [
    { name:'Presentation_Draft.pptx', type:'pptx' },
    { name:'Analysis_Data.xlsx',      type:'xlsx' },
    { name:'Report_Chapter3.docx',    type:'docx' },
    { name:'Survey_Results.pdf',      type:'pdf'  },
    { name:'Meeting_Notes.docx',      type:'docx' },
  ];

  function simulateUpload() {
    closeModal();
    const pick = sampleFiles[Math.floor(Math.random() * sampleFiles.length)];
    const user = GM.user || { name:'You' };
    const files = GM.files;
    files.unshift({
      name: pick.name,
      type: pick.type,
      size: Math.round(Math.random() * 900 + 50) + ' KB',
      by:   user.name,
      date: 'Just now',
    });
    GM.saveFiles(files);
    render();
    toast('File uploaded successfully! ✓', 'success');
  }

  render();
</script>
</body>
</html>
